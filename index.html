<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Flash</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f; color: #eee;
    display: flex; flex-direction: column;
  }
  [hidden] { display: none !important; }

  .screen {
    flex: 1; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; gap: 18px; text-align: center;
  }
  h1 { font-size: 2.4rem; letter-spacing: .02em; }
  .sub { opacity: .6; font-size: .95rem; max-width: 320px; }

  button {
    font: inherit; padding: 14px 28px; border-radius: 12px; border: none;
    background: #6c5ce7; color: #fff; font-weight: 600; cursor: pointer; min-width: 220px;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .35; cursor: not-allowed; }
  button.secondary { background: #23232f; }
  button.danger { background: #3a1f1f; color: #ff8a8a; }

  input[type=text] {
    font: inherit; padding: 14px; border-radius: 12px; border: 2px solid #2c2c38;
    background: #161620; color: #fff; text-align: center;
    text-transform: uppercase; letter-spacing: .2em; width: 220px;
  }
  input[type=text]:focus { outline: none; border-color: #6c5ce7; }

  .divider { opacity: .35; font-size: .8rem; }

  #code-display, #share-code { font-size: 2.6rem; font-weight: 700; letter-spacing: .12em; }
  #qr-canvas, #share-qr-canvas { border-radius: 12px; background: #fff; padding: 8px; line-height: 0; }

  .badge { padding: 6px 14px; border-radius: 999px; background: #1a1a24; font-size: .85rem; }
  .badge.on { background: #1f4d2f; color: #6fe08c; }

  .row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

  /* Un mini-bar par bande (basses/médiums/aigus), couleurs = mapping RGB réel */
  .meter { width: 70px; height: 10px; background: #1a1a24; border-radius: 6px; overflow: hidden; }
  .meter-fill { height: 100%; width: 0%; }

  #track-name { font-size: .85rem; opacity: .7; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  input[type=color] {
    width: 56px; height: 40px; border-radius: 10px; border: 2px solid #2c2c38;
    background: #161620; padding: 2px; cursor: pointer;
  }

  /* ── Overlays plein écran (scanner QR, partage session) ── */
  .overlay { position: fixed; inset: 0; z-index: 20; background: #000; }
  #scan-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .overlay-ui {
    position: relative; z-index: 1; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  }
  .scan-frame { width: 220px; height: 220px; border: 3px solid #6c5ce7; border-radius: 16px; box-shadow: 0 0 0 2000px rgba(0,0,0,.5); }

  /* ── Écran client : zone plein écran réactive au flash ── */
  #screen-client { position: relative; padding: 0; overflow: hidden; }
  #flash-zone {
    position: absolute; inset: 0; background-color: #000;
    transition: background-color 60ms linear;
  }
  .client-ui {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    height: 100%; width: 100%; padding: 24px; gap: 16px;
  }
  .client-ui .row { padding-top: 8px; }
</style>
</head>
<body>

  <!-- ─── Accueil ─── -->
  <div class="screen" id="screen-home">
    <h1>⚡ Flash</h1>
    <p class="sub">Light show synchronisé — un maître joue la musique, les téléphones autour flashent en rythme.</p>

    <button id="btn-create">🎵 Créer une session</button>

    <span class="divider">— ou —</span>

    <input type="text" id="input-code" placeholder="CODE" maxlength="6" autocomplete="off" autocapitalize="characters">
    <div class="row">
      <button id="btn-join" class="secondary">Rejoindre</button>
      <button id="btn-scan" class="secondary" hidden>📷 Scanner</button>
    </div>
  </div>

  <!-- ─── Maître ─── -->
  <div class="screen" id="screen-master" hidden>
    <div id="code-display">----</div>
    <canvas id="qr-canvas"></canvas>
    <p id="qr-hint" class="sub" hidden>QR indisponible (réseau/CDN) — utilise le code</p>
    <div class="row">
      <span class="badge"><span id="master-peers">0</span> connecté(s)</span>
      <span id="master-status" class="badge">Connexion...</span>
    </div>

    <input type="file" id="audio-file" accept="audio/*,.mp3,.m4a,.wav,.aac,.ogg">
    <div id="track-name"></div>

    <div class="row">
      <button id="btn-play" disabled>▶ Lecture</button>
      <input type="color" id="color-picker" value="#ffffff" title="Couleur du flash écran">
    </div>
    <div class="row">
      <div class="meter"><div id="meter-bass" class="meter-fill" style="background:#ff5c5c"></div></div>
      <div class="meter"><div id="meter-mid" class="meter-fill" style="background:#5cff8a"></div></div>
      <div class="meter"><div id="meter-treble" class="meter-fill" style="background:#5c8aff"></div></div>
    </div>

    <button id="btn-leave-master" class="danger">Quitter la session</button>
  </div>

  <!-- ─── Client ─── -->
  <div class="screen" id="screen-client" hidden>
    <div id="flash-zone"></div>
    <div class="client-ui">
      <span id="client-status" class="badge">Connexion...</span>
      <div class="row">
        <span class="badge"><span id="client-peers">0</span> connecté(s)</span>
        <span id="torch-badge" class="badge">…</span>
      </div>
      <div class="row">
        <button id="btn-share-client" class="secondary">🔗 Inviter</button>
        <button id="btn-leave-client" class="danger">Quitter</button>
      </div>
    </div>
  </div>

  <!-- ─── Scanner QR ─── -->
  <div id="scan-overlay" class="overlay" hidden>
    <video id="scan-video" playsinline muted autoplay></video>
    <div class="overlay-ui">
      <div class="scan-frame"></div>
      <button id="btn-scan-cancel" class="secondary">Annuler</button>
    </div>
  </div>

  <!-- ─── Partager la session (accessible depuis l'écran client) ─── -->
  <div id="share-overlay" class="overlay" hidden>
    <div class="overlay-ui">
      <div id="share-code">----</div>
      <canvas id="share-qr-canvas"></canvas>
      <p id="share-qr-hint" class="sub" hidden>QR indisponible (réseau/CDN) — utilise le code</p>
      <button id="btn-share-close" class="secondary">Fermer</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/lib/browser.min.js"></script>
<script>
(() => {
  'use strict';

  // Dev local (localhost, 127.0.0.1, ou une IP du réseau local pour tester
  // depuis un vrai téléphone sur le même wifi) → serveur local au même hôte.
  // Sinon → serveur Render.
  function isLocalDevHost(hostname) {
    return hostname === 'localhost'
      || hostname === '127.0.0.1'
      || /^192\.168\.\d{1,3}\.\d{1,3}$/.test(hostname)
      || /^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(hostname)
      || /^172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}$/.test(hostname);
  }

  const IS_LOCAL_DEV = isLocalDevHost(location.hostname);
  const WS_SERVER = IS_LOCAL_DEV
    ? `ws://${location.hostname}:3001`
    : 'wss://flash-a9yt.onrender.com';
  // file:// (double-clic sur index.html) donne un hostname vide -> ni local
  // ni configuré. On le détecte pour donner un message clair plutôt que de
  // laisser les 8 tentatives de reconnexion échouer en silence.
  const WS_SERVER_CONFIGURED = IS_LOCAL_DEV || !WS_SERVER.includes('REMPLACER');

  const $ = (sel) => document.querySelector(sel);

  const screens = {
    home: $('#screen-home'),
    master: $('#screen-master'),
    client: $('#screen-client'),
  };

  function showScreen(name) {
    for (const [key, el] of Object.entries(screens)) el.hidden = key !== name;
  }

  function randomCode(len = 5) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // sans I/O/0/1 ambigus
    let out = '';
    for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }

  // ─── WebSocket ──────────────────────────────────────────────────────────
  // Reconnexion auto avec backoff : une coupure réseau (wifi de salle, bascule
  // 4G) ne doit pas figer la session indéfiniment. Combiné au heartbeat serveur
  // (voir server.js), un maître qui se reconnecte reprend son rôle proprement.

  const MAX_RECONNECT_ATTEMPTS = 8;

  let ws = null;
  let wsRole = null;
  let wsSessionId = null;
  let wsIntentional = false;
  let pingInterval = null;
  let reconnectTimer = null;
  let reconnectAttempts = 0;

  function wsConnect(sessionId, role, isRetry = false) {
    if (!WS_SERVER_CONFIGURED) {
      const msg = 'Serveur non configuré (voir claude.md § Hébergement)';
      if (role === 'client') clientSetStatus(msg); else masterSetStatus(msg);
      return;
    }

    wsSessionId = sessionId;
    wsRole = role;
    wsIntentional = false;

    const socket = new WebSocket(`${WS_SERVER}/session/${sessionId}`);
    socket._isRetry = isRetry;
    ws = socket;

    socket.addEventListener('open', () => {
      if (ws !== socket) return;
      reconnectAttempts = 0;
      wsSend({ type: 'identify', role });
      pingInterval = setInterval(() => wsSend({ type: 'ping' }), 20000);
      if (role === 'master') masterSetStatus('Connecté');
    });

    socket.addEventListener('message', (ev) => {
      if (ws !== socket) return;
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      handleWsMessage(msg);
    });

    socket.addEventListener('close', () => {
      if (ws !== socket) return; // ancienne connexion remplacée par un reconnect, on ignore
      clearInterval(pingInterval);
      if (wsIntentional) return;

      if (wsRole === 'client') {
        clientSetStatus('Connexion perdue — reconnexion...');
        clientApplyCue(0, 0, 0); // ne reste pas figé sur la dernière couleur/torche
      } else if (wsRole === 'master') {
        masterSetStatus('Connexion perdue — reconnexion...');
      }
      scheduleReconnect();
    });
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
      const msg = 'Connexion impossible — recharge la page';
      if (wsRole === 'client') clientSetStatus(msg); else masterSetStatus(msg);
      return;
    }
    const delay = Math.min(1000 * 2 ** reconnectAttempts, 8000);
    reconnectAttempts++;
    reconnectTimer = setTimeout(() => wsConnect(wsSessionId, wsRole, true), delay);
  }

  function wsSend(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }

  function wsDisconnect() {
    wsIntentional = true;
    clearTimeout(reconnectTimer);
    reconnectAttempts = 0;
    wsSessionId = null;
    if (ws) { ws.close(); ws = null; }
    clearInterval(pingInterval);
  }

  function handleWsMessage(msg) {
    switch (msg.type) {
      case 'joined':
        setPeerCount(msg.peers);
        if (wsRole === 'client') clientSetMasterStatus(msg.hasMaster);
        break;
      case 'master_status':
        if (wsRole === 'client') clientSetMasterStatus(msg.hasMaster);
        break;
      case 'peers_update':
        setPeerCount(msg.peers);
        break;
      case 'cue':
        if (wsRole === 'client') clientApplyCue(msg.bass, msg.mid, msg.treble);
        break;
      case 'track_control':
        if (wsRole === 'client' && msg.action === 'pause') clientApplyCue(0, 0, 0);
        break;
      case 'color':
        if (wsRole === 'client') clientSetColor(msg.color);
        break;
      case 'error':
        onWsError(msg);
        break;
    }
  }

  function onWsError(msg) {
    // Pendant un reconnect auto, un MASTER_TAKEN peut être transitoire : le
    // serveur n'a peut-être pas encore détecté (via heartbeat) que l'ancienne
    // connexion est morte. On retente plutôt que d'éjecter l'utilisateur.
    if (msg.code === 'MASTER_TAKEN' && ws?._isRetry) {
      scheduleReconnect();
      return;
    }
    if (msg.code === 'MASTER_TAKEN') alert('Session déjà pilotée par un autre maître.');
    else if (msg.code === 'SESSION_FULL') alert('Session pleine.');
    else return;
    wsDisconnect();
    showScreen('home');
  }

  function setPeerCount(n) {
    $('#master-peers').textContent = n;
    $('#client-peers').textContent = n;
  }

  function masterSetStatus(text) {
    $('#master-status').textContent = text;
  }

  // ─── Écran actif (wake lock) ────────────────────────────────────────────
  // Sans ça, le verrouillage d'écran du téléphone coupe rAF/timers et TOUT
  // s'arrête net — la cause la plus probable d'un "freeze" en usage réel.

  let wakeLock = null;
  let wakeLockWanted = false;

  function requestWakeLock() {
    wakeLockWanted = true;
    acquireWakeLock();
  }

  function releaseWakeLock() {
    wakeLockWanted = false;
    if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
  }

  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch { /* refusé, tant pis */ }
  }

  document.addEventListener('visibilitychange', () => {
    // Le wake lock est auto-relâché par le navigateur quand l'onglet passe en
    // arrière-plan — il faut le redemander explicitement au retour.
    if (wakeLockWanted && document.visibilityState === 'visible') acquireWakeLock();
  });

  // ─── Accueil ────────────────────────────────────────────────────────────

  $('#btn-create').addEventListener('click', () => startMaster(randomCode()));

  $('#btn-join').addEventListener('click', () => {
    const code = $('#input-code').value.trim().toUpperCase();
    if (code.length < 4) { $('#input-code').focus(); return; }
    startClient(code);
  });

  const joinParam = new URLSearchParams(location.search).get('join');
  if (joinParam) $('#input-code').value = joinParam.toUpperCase();

  // ─── Maître ─────────────────────────────────────────────────────────────

  let audioCtx = null, analyser = null, audioEl = null, analysisTimer = null;
  let playing = false;
  let bandRanges = null; // {bass:[lo,hi], mid:[lo,hi], treble:[lo,hi]} en indices de bin
  let currentBlobUrl = null, onAudioError = null, onAudioCanplay = null;

  function startMaster(code) {
    showScreen('master');
    $('#code-display').textContent = code;
    renderQr(code);
    wsConnect(code, 'master');
    requestWakeLock();
  }

  $('#color-picker').addEventListener('input', (e) => {
    wsSend({ type: 'color', color: e.target.value });
  });

  function renderQr(code) {
    renderQrInto('#qr-canvas', '#qr-hint', code);
  }

  // Réutilisé par le QR permanent du maître et par le partage depuis l'écran
  // client (n'importe qui déjà dans la session peut inviter, pas seulement
  // la personne qui l'a créée).
  function renderQrInto(canvasSel, hintSel, code) {
    // La lib QR vient d'un CDN — un blocage (ad-blocker, offline, wifi de salle)
    // ne doit jamais empêcher la connexion WS qui suit. Fallback : code texte seul.
    $(canvasSel).hidden = false;
    $(hintSel).hidden = true;
    if (!('QRCode' in window)) {
      console.warn('[qr] bibliothèque indisponible — code texte uniquement');
      $(canvasSel).hidden = true;
      $(hintSel).hidden = false;
      return;
    }
    const url = `${location.origin}${location.pathname}?join=${code}`;
    QRCode.toCanvas($(canvasSel), url, { width: 220, margin: 1 }, (err) => {
      if (err) { console.error('[qr]', err); $(canvasSel).hidden = true; $(hintSel).hidden = false; }
    });
  }

  $('#audio-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) setupAudio(file);
  });

  // État piloté par les événements natifs 'play'/'pause' de l'élément audio,
  // pas par le bouton : un bouton-seul désynchronise `playing` de la réalité
  // dès que quelque chose met en pause en dehors du clic (fin de piste, ou
  // sur mobile une interruption OS — appel, autre appli audio, etc.). Les
  // événements natifs se déclenchent dans tous les cas, donc `playing` reste
  // toujours correct, et cues/torche/couleur ne restent jamais figés en
  // silence côté clients.
  function setupAudio(file) {
    if (!audioEl) {
      audioEl = new Audio();
      audioEl.loop = true; // une piste qui finit ne doit pas juste éteindre le show
      audioEl.addEventListener('play', () => {
        playing = true;
        updatePlayButton();
        wsSend({ type: 'track_control', action: 'play' });
        clearInterval(analysisTimer);
        analysisTimer = setInterval(analysisTick, 33); // ~30Hz, immunisé au throttling de requestAnimationFrame en arrière-plan
      });
      audioEl.addEventListener('pause', () => {
        playing = false;
        updatePlayButton();
        wsSend({ type: 'track_control', action: 'pause' });
        clearInterval(analysisTimer);
      });
    }

    // Annule les listeners "once" d'un chargement précédent pas encore résolu
    // (ex. fichier changé juste après le précédent, ou quitté entre-temps).
    if (onAudioError) audioEl.removeEventListener('error', onAudioError);
    if (onAudioCanplay) audioEl.removeEventListener('canplay', onAudioCanplay);

    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl); // libère le fichier précédent
    currentBlobUrl = URL.createObjectURL(file);
    audioEl.src = currentBlobUrl;

    $('#btn-play').disabled = true; // réactivé seulement quand le fichier est confirmé lisible
    $('#track-name').textContent = file.name;

    onAudioError = () => {
      console.error('[audio] échec de chargement', audioEl.error);
      alert(`Impossible de charger "${file.name}" — format audio non supporté par ce navigateur.`);
      $('#track-name').textContent = '';
    };
    onAudioCanplay = () => { $('#btn-play').disabled = false; };
    audioEl.addEventListener('error', onAudioError, { once: true });
    audioEl.addEventListener('canplay', onAudioCanplay, { once: true });

    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaElementSource(audioEl);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048; // résolution fine, nécessaire pour bien séparer basses/médiums/aigus
      analyser.smoothingTimeConstant = 0.2; // peu de lissage natif : on veut des transitoires nets, l'enveloppe de beat s'occupe du reste
      source.connect(analyser);
      analyser.connect(audioCtx.destination);

      const binHz = audioCtx.sampleRate / analyser.fftSize;
      const toBin = (hz) => Math.round(hz / binHz);
      bandRanges = {
        bass:   [toBin(20),   toBin(250)],
        mid:    [toBin(250),  toBin(4000)],
        treble: [toBin(4000), toBin(12000)],
      };
    }
  }

  function resetMasterAudio() {
    if (audioEl) {
      if (onAudioError) { audioEl.removeEventListener('error', onAudioError); onAudioError = null; }
      if (onAudioCanplay) { audioEl.removeEventListener('canplay', onAudioCanplay); onAudioCanplay = null; }
      audioEl.pause(); // déclenche le listener 'pause' -> playing=false, timer coupé
      audioEl.removeAttribute('src');
      audioEl.load();
    }
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
    $('#btn-play').disabled = true;
    $('#track-name').textContent = '';
    $('#audio-file').value = '';
    $('#meter-bass').style.width = '0%';
    $('#meter-mid').style.width = '0%';
    $('#meter-treble').style.width = '0%';
  }

  $('#btn-play').addEventListener('click', async () => {
    if (!audioEl) return;
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    try {
      if (playing) audioEl.pause();
      else await audioEl.play();
    } catch (err) {
      console.error('[audio] lecture impossible', err);
      alert('Lecture impossible — format non supporté par ce navigateur ?');
    }
  });

  function updatePlayButton() {
    $('#btn-play').textContent = playing ? '⏸ Pause' : '▶ Lecture';
  }

  // ─── Détection de "beat" par bande ───────────────────────────────────────
  // Une simple moyenne de magnitude suit le volume mais "clignote" au gré du
  // bruit du signal plutôt que de suivre le rythme. Ici : l'énergie instantanée
  // est comparée à sa moyenne glissante récente — un pic net déclenche une
  // attaque immédiate, puis l'enveloppe redescend en décroissance exponentielle
  // jusqu'au prochain coup. Un vrai flash sur le beat plutôt qu'un flicker.
  //
  // v1 déclenchait trop souvent : un signal soutenu et fort (ex. basse continue)
  // dépasse facilement moyenne×1.25 à répétition, frame après frame, ce qui
  // donnait un flicker rapide plutôt que des coups nets. Fix : seuil relevé
  // (×1.5) + période réfractaire (~120ms) qui empêche un nouveau déclenchement
  // tant que le coup précédent n'a pas eu le temps de redescendre.
  const MIN_BEAT_INTERVAL_MS = 120;

  function createBandEnvelope() {
    const history = [];
    const HISTORY_SIZE = 21; // ~0.7s à 33ms/tick (setInterval, pas 60fps -- ne pas recompter en frames)
    let envelope = 0;
    let lastBeatAt = -Infinity;
    return (energy, now) => {
      history.push(energy);
      if (history.length > HISTORY_SIZE) history.shift();
      const avg = history.reduce((a, b) => a + b, 0) / history.length;
      const cooldownOk = now - lastBeatAt > MIN_BEAT_INTERVAL_MS;
      const isBeat = cooldownOk && energy > avg * 1.5 && energy > 0.15;
      if (isBeat) {
        envelope = Math.min(1, energy * 1.15);
        lastBeatAt = now;
      } else {
        envelope *= 0.88;
      }
      // Plancher proportionnel à l'énergie courante : entre deux coups nets,
      // l'affichage "respire" avec le volume réel au lieu de tomber à zéro et
      // sembler mort pendant un passage soutenu/peu percussif.
      return Math.max(envelope, energy * 0.3);
    };
  }

  const bassEnvelope = createBandEnvelope();
  const midEnvelope = createBandEnvelope();
  const trebleEnvelope = createBandEnvelope();

  function bandEnergy(data, [lo, hi]) {
    const from = Math.max(0, lo), to = Math.min(data.length - 1, hi);
    if (to < from) return 0;
    let sum = 0;
    for (let i = from; i <= to; i++) sum += data[i];
    return (sum / (to - from + 1)) / 255;
  }

  // setInterval plutôt que requestAnimationFrame : rAF est suspendu par le
  // navigateur quand l'onglet n'est pas au premier plan (indépendant du Wake
  // Lock, qui ne couvre que le verrouillage d'écran) — cause probable du
  // "figé sauf si on quitte et revient" en testant sur ordinateur, où changer
  // d'onglet/fenêtre est courant. setInterval continue de tourner (throttle
  // beaucoup plus mollement en arrière-plan) donc les cue continuent de partir.
  function analysisTick() {
    if (!playing) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const now = performance.now();

    const bass = bassEnvelope(bandEnergy(data, bandRanges.bass), now);
    const mid = midEnvelope(bandEnergy(data, bandRanges.mid), now);
    const treble = trebleEnvelope(bandEnergy(data, bandRanges.treble), now);

    $('#meter-bass').style.width = `${Math.round(bass * 100)}%`;
    $('#meter-mid').style.width = `${Math.round(mid * 100)}%`;
    $('#meter-treble').style.width = `${Math.round(treble * 100)}%`;

    const r3 = (v) => Math.round(v * 1000) / 1000;
    wsSend({ type: 'cue', bass: r3(bass), mid: r3(mid), treble: r3(treble) });
  }

  $('#btn-leave-master').addEventListener('click', () => {
    wsDisconnect();
    releaseWakeLock();
    resetMasterAudio();
    showScreen('home');
  });

  // ─── Client ─────────────────────────────────────────────────────────────

  let torchTrack = null, torchSupported = false, torchTimer = null, torchLoopActive = false;
  let latestIntensity = 0; // max(bass,mid,treble) — pilote la torche, forcément en niveaux de gris
  let latestBass = 0, latestMid = 0, latestTreble = 0;
  let currentColor = { r: 255, g: 255, b: 255 }; // blanc par défaut = teinte neutre, laisse passer les 3 bandes

  function startClient(code) {
    showScreen('client');
    clientSetStatus('Connexion...');
    currentColor = { r: 255, g: 255, b: 255 };
    latestBass = latestMid = latestTreble = 0;
    wsConnect(code, 'client');
    setupTorch();
    requestWakeLock();
  }

  function clientSetMasterStatus(hasMaster) {
    clientSetStatus(hasMaster ? 'Synchronisé' : 'En attente du maître...');
  }

  function clientSetStatus(text) {
    $('#client-status').textContent = text;
  }

  function clientSetColor(hex) {
    const m = /^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex);
    if (!m) return;
    currentColor = { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
    clientApplyCue(latestBass, latestMid, latestTreble); // ré-applique tout de suite avec la nouvelle teinte
  }

  // La couleur choisie par le maître est une teinte/palette, pas une valeur figée :
  // chaque canal RGB suit l'énergie de sa propre bande de fréquence, donc la
  // couleur affichée évolue réellement avec la musique (basses -> rouge, médiums
  // -> vert, aigus -> bleu, pondérés par la teinte). En blanc (défaut), c'est une
  // vraie visualisation spectrale. La torche reste en niveaux de gris (une torche
  // physique ne peut pas être teintée) et suit les aigus : transitoires plus nets
  // (hi-hats/cymbales) que les basses, souvent plus soutenues donc moins nettes
  // à détecter proprement.
  function clientApplyCue(bass, mid, treble) {
    latestBass = Math.max(0, Math.min(1, bass));
    latestMid = Math.max(0, Math.min(1, mid));
    latestTreble = Math.max(0, Math.min(1, treble));
    latestIntensity = latestTreble;

    const r = (currentColor.r * latestBass) | 0;
    const g = (currentColor.g * latestMid) | 0;
    const b = (currentColor.b * latestTreble) | 0;
    $('#flash-zone').style.backgroundColor = `rgb(${r},${g},${b})`;
    if (torchSupported && !torchLoopActive) torchLoop();
  }

  async function setupTorch() {
    if (!navigator.mediaDevices?.getUserMedia) {
      $('#torch-badge').textContent = '📱 Mode écran';
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 64 }, height: { ideal: 64 } },
      });
      const track = stream.getVideoTracks()[0];
      const caps = track.getCapabilities?.() || {};
      if (caps.torch) {
        torchTrack = track;
        torchSupported = true;
        $('#torch-badge').textContent = '🔦 Torche active';
        $('#torch-badge').classList.add('on');
      } else {
        track.stop();
        $('#torch-badge').textContent = '📱 Mode écran';
      }
    } catch {
      $('#torch-badge').textContent = '📱 Mode écran';
    }
  }

  // Boucle auto-entretenue, découplée du débit réseau des cues :
  // lit latestIntensity à chaque tick de fenêtre plutôt que d'être relancée à chaque message.
  function torchLoop() {
    torchLoopActive = true;
    const WINDOW_MS = 200;
    const v = latestIntensity;
    const onMs = Math.round(v * WINDOW_MS);

    if (onMs <= 5) {
      setTorch(false);
      torchTimer = setTimeout(torchLoop, WINDOW_MS);
    } else if (onMs >= WINDOW_MS - 5) {
      setTorch(true);
      torchTimer = setTimeout(torchLoop, WINDOW_MS);
    } else {
      setTorch(true);
      torchTimer = setTimeout(() => {
        setTorch(false);
        torchTimer = setTimeout(torchLoop, WINDOW_MS - onMs);
      }, onMs);
    }
  }

  function setTorch(on) {
    if (torchTrack) torchTrack.applyConstraints({ advanced: [{ torch: on }] }).catch(() => {});
  }

  function stopTorch() {
    clearTimeout(torchTimer);
    torchLoopActive = false;
    if (torchTrack) {
      setTorch(false);
      torchTrack.stop();
      torchTrack = null;
    }
    torchSupported = false;
  }

  $('#btn-leave-client').addEventListener('click', () => {
    stopTorch();
    wsDisconnect();
    releaseWakeLock();
    showScreen('home');
  });

  $('#btn-share-client').addEventListener('click', () => {
    if (!wsSessionId) return;
    $('#share-code').textContent = wsSessionId;
    renderQrInto('#share-qr-canvas', '#share-qr-hint', wsSessionId);
    $('#share-overlay').hidden = false;
  });

  $('#btn-share-close').addEventListener('click', () => { $('#share-overlay').hidden = true; });

  // ─── Scanner QR in-app ──────────────────────────────────────────────────
  // BarcodeDetector uniquement (Chrome/Edge/Android + Safari 17+) : pas de
  // lib CDN pour ça, on a déjà eu un bug à cause d'un CDN bloqué pour le QR
  // encoder (voir renderQr) — inutile de dupliquer ce risque. Sans support,
  // le bouton reste caché ; code manuel ou scan via l'appareil photo natif.

  const scanSupported = 'BarcodeDetector' in window;
  if (scanSupported) $('#btn-scan').hidden = false;

  let scanStream = null, scanTimer = null;

  $('#btn-scan').addEventListener('click', startScan);
  $('#btn-scan-cancel').addEventListener('click', stopScan);

  async function startScan() {
    let detector;
    try {
      detector = new BarcodeDetector({ formats: ['qr_code'] });
    } catch {
      alert('Scanner QR indisponible sur ce navigateur.');
      return;
    }
    try {
      scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    } catch {
      alert('Accès caméra refusé ou indisponible.');
      return;
    }
    $('#scan-video').srcObject = scanStream;
    $('#scan-overlay').hidden = false;
    scanLoop(detector);
  }

  async function scanLoop(detector) {
    if (!scanStream) return;
    try {
      const codes = await detector.detect($('#scan-video'));
      const code = codes.length ? extractCode(codes[0].rawValue) : null;
      if (code) { stopScan(); startClient(code); return; }
    } catch { /* frame pas encore prête — on retente */ }
    scanTimer = setTimeout(() => scanLoop(detector), 250);
  }

  function extractCode(raw) {
    try {
      const j = new URL(raw).searchParams.get('join');
      if (j) return j.toUpperCase();
    } catch { /* pas une URL — peut-être le code brut */ }
    return /^[A-Z0-9]{4,8}$/i.test(raw) ? raw.toUpperCase() : null;
  }

  function stopScan() {
    clearTimeout(scanTimer);
    if (scanStream) { scanStream.getTracks().forEach((t) => t.stop()); scanStream = null; }
    $('#scan-overlay').hidden = true;
  }

  showScreen('home');
})();
</script>
</body>
</html>
